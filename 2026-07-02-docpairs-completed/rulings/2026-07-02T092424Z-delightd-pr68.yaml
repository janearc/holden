ruling:
  diff_ref: 3dbb2f6d3d1f3ee4a77888eae2629183357fc564
  judge_instance: judge-20260702T092302Z-p99864
  fired_at: 2026-07-02T09:25:10Z
  verdict: ratify
  divergences:
  - claim: |
      The doc-pairing gate itself — the map (.docpairs:1-12), the checker (tools/docpairs/main.go), its tests (tools/docpairs/main_test.go), and the CI job (.github/workflows/ci.yml:89-101, post-image) — appears in no provided design doc: no document in the bundle describes a docpairs gate, a `.docpairs` file, or a `tools/` checker.
    necessary: true
    justification: |
      Carried unchanged from the prior ruling on this PR (rulings/2026-07-02T091958Z-delightd-pr68.yaml, first divergence), which ratified the identical gate artifacts at the prior head sha; nothing about them changed at this head. The gate family is design-sanctioned even though this gate's own spec is not in the bundle: docs/contract-ownership.md:24-26 records ADR-0001 ("the coding-process gates") as the governing frame, and this artifact is exactly a coding-process gate. It claims only the mechanical half — "This proves the doc was TOUCHED, not that it is true — content truth is a review question" (.docpairs:4-5, restated at tools/docpairs/main.go:2-5) — leaving content truth to this judgment gate. Blast radius remains purely additive process tooling: no runtime surface, contract, or daemon behavior described in any provided design doc is altered.
  - claim: |
      docs/api.md gains six routes this diff does not implement — the `GET /projects` table row (docs/api.md:12, post-image) and `POST /register`, `GET /registrations`, `GET /resolve/{name}`, `GET /services`, `GET /services/{name}` (docs/api.md:19-23, post-image, with full body sections at docs/api.md:294-384, post-image) — under the standing claim that the table is "the complete surface registered in `Mux()`" (docs/api.md:4-5).
    necessary: true
    justification: |
      This is the doc tracking reality, and this head completes the repair the prior rulings staged. The registration rows close the follow-up first recorded in rulings/2026-07-02T082925Z-delightd-pr65.yaml (first divergence: api.md "contains no `/registrations` route and no registration-accept route") and re-recorded in rulings/2026-07-02T083348Z-delightd-pr65.yaml. Beyond the table rows the prior head carried, this head also writes the five per-route body sections with JSON shapes and status tables (docs/api.md:294-384, post-image) and classifies the new name-taking routes in the 404-semantics passage (`/services/{name}` on the control axis, `/resolve/{name}` as its own always-404-never-503 bullet, `POST /register` on the roster axis — docs/api.md:33-41, post-image) — exactly the necessary:false gap the prior ruling on this PR recorded (rulings/2026-07-02T091958Z-delightd-pr68.yaml, third divergence), now closed rather than left to drift. Evidence the routes exist at head is the strongest this bundle format carries (path-level tree state, per the precedent in rulings/2026-07-02T074856Z-magpie-pr22.yaml): pkg/httpapi/register.go and pkg/httpapi/register_test.go for /register and /registrations; proto/resolve/v1/resolve.proto, gen/rust/src/resolve.rs, and gen/rust/src/resolve/v1.rs for the resolve surface, which docs/contract-ownership.md:13-14 pins as delightd-owned; pkg/registry/registry.go plus the vocabulary tests (pkg/registry/vocabulary_test.go, pkg/httpapi/vocabulary_test.go) for the composed /services roster ("how a service announces itself and how the roster is queried", docs/contract-ownership.md:10-12); pkg/schemaregistry/client.go for the fail-closed contract-verification gate the /register section describes (docs/api.md:296-301, post-image). The finer behavioral claims in the new sections (five gates in order, lease, dial-back) cannot be read off paths alone, but the dedicated test files are the strongest evidence this format carries, and prior rulings committed this judge to deciding on tree state.
  - claim: |
      The `POST /register` section asserts "Every decline also emits a never-silent `registry.v1.NotRegistered` event on a detached goroutine" (docs/api.md:318-319, post-image), while docs/events.md — which presents itself as the Kafka event contract ("The implementation is `pkg/events`; this document is the contract", docs/events.md:6-8) — documents only `delight.v1.BackupEvent` ("After each checkpoint attempt, delightd emits a `delight.v1.BackupEvent`", docs/events.md:3-4) and remains untouched by this diff.
    necessary: false
    justification: |
      The event's existence is supported at head by proto/registry/v1/events.proto (repo tree) and its ownership is design-sanctioned (`registry.v1` is delightd-owned, docs/contract-ownership.md:10-12), so documenting the emission in api.md is truthful. But nothing about this diff required leaving docs/events.md as an event-contract document that no longer covers the daemon's whole event surface — after this diff, delightd's docs describe two emitted event families while the events contract doc describes one. This is the untouched-doc-made-incomplete pattern already ratified as necessary:false precedent (rulings/2026-07-02T082925Z-delightd-pr65.yaml, second divergence, operations.md). Non-blocking; recorded so a docs follow-up absorbs the registration-decline event (topic, subject, framing, best-effort semantics) into docs/events.md instead of letting the gap drift silently.
  shape_verdict: on-mesh
  shape_justification: |
    The gate half is unchanged from the head already found on-mesh (rulings/2026-07-02T091958Z-delightd-pr68.yaml): Go, the control-plane language of record; the entire decision kept pure for tests ("check is the whole gate, kept pure for the tests", tools/docpairs/main.go:70-71) with every documented matcher shape covered, segment-boundary prefixes included ("pkg/httpapifake/x.go", false — tools/docpairs/main_test.go:69); loud typed failure (violations name every path and exit 1, tools/docpairs/main.go:62-67; operational errors exit 2, tools/docpairs/main.go:142-145); and candid fail-soft on no base ("a gate that guesses is worse than a gate that says so", tools/docpairs/main.go:11-13, 36-39). What this head adds is the docs half done to the document's own bar: the five new routes get full per-route sections in the established house pattern — JSON example, status table, error bodies (docs/api.md:294-384, post-image) — rather than the table-row-only minimum the prior ruling flagged, and the deliberate 404 taxonomy the document stakes out (docs/api.md:30-41, post-image) is extended to classify every new name-taking route instead of leaving them unclassified. Semantics stay consistent with the governing docs: the /register error ladder fails closed on an unreachable schema registry (503, docs/api.md:308, post-image), matching the fail-closed posture of docs/availability.md, and the resolve miss-is-404-not-503 rule is stated as a semantic commitment, not left implicit. The diff is self-consistent under its own gate (it touches no paired glob; docs/api.md never triggers its own pairing, tools/docpairs/main.go:78-79). The one remaining seam is the events.md gap recorded in the third divergence — a docs-completeness debt, not a structural fault.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-docpairs/rulings/2026-07-02T092424Z-delightd-pr68.yaml

ruling:
  diff_ref: 4364acbc48c7bb4e8370872d391d47454d121a73
  judge_instance: judge-20260702T091609Z-p95324
  fired_at: 2026-07-02T09:19:24Z
  verdict: ratify
  divergences:
  - claim: |
      The doc-pairing gate itself — the map (.docpairs:1-12), the checker (tools/docpairs/main.go), and the CI job (.github/workflows/ci.yml:89-101, post-image) — appears in no provided design doc: no document in the bundle describes a docpairs gate, a `.docpairs` file, or a `tools/` checker.
    necessary: true
    justification: |
      The gate family is design-sanctioned even though this gate's own spec is not in the bundle: docs/contract-ownership.md:24-26 records ADR-0001 ("the coding-process gates") as the governing frame and was itself written as that ADR's pilot prerequisite, and this artifact is exactly a coding-process gate. It also keeps the gate model's division of labor honest on its face: it claims only the mechanical half — "This proves the doc was TOUCHED, not that it is true — content truth is a review question" (.docpairs:4-5, restated at tools/docpairs/main.go:2-5) — leaving content truth to this judgment gate rather than usurping it. The blast radius is purely additive process tooling: no runtime surface, no contract, no daemon behavior in any provided design doc is altered. Recorded so the sprint ledger can tie this artifact to the ADR-0001 gate list (per the repo history framing of Sprint 6), which is not among the provided materials.
  - claim: |
      docs/api.md's route table gains six routes this diff does not implement: `GET /projects` (docs/api.md:12, post-image) and `POST /register`, `GET /registrations`, `GET /resolve/{name}`, `GET /services`, `GET /services/{name}` (docs/api.md:19-23, post-image), under the standing claim that the table is "the complete surface registered in `Mux()`" (docs/api.md:4-5).
    necessary: true
    justification: |
      This is the doc tracking reality, and for the registration rows it is the exact follow-up the prior rulings left open: rulings/2026-07-02T082925Z-delightd-pr65.yaml (first divergence) recorded that api.md's table "contains no `/registrations` route and no registration-accept route" and asked that "a docs follow-up adds the registration surface to api.md and restores its completeness claim"; rulings/2026-07-02T083348Z-delightd-pr65.yaml re-recorded it as still open. This diff closes it. Evidence the routes exist at head is the strongest this bundle format carries (path-level tree state, per the precedent in rulings/2026-07-02T074856Z-magpie-pr22.yaml): pkg/httpapi/register.go and pkg/httpapi/register_test.go for /register and /registrations (already accepted at this level by the pr65 rulings); proto/resolve/v1/resolve.proto, gen/rust/src/resolve.rs, and gen/rust/src/resolve/v1.rs for the resolve surface, which docs/contract-ownership.md:13-14 pins as delightd-owned ("`resolve.v1` — the resolve surface"); pkg/registry/registry.go and the vocabulary tests (pkg/registry/vocabulary_test.go, pkg/httpapi/vocabulary_test.go) for the composed /services roster, whose query role registry.v1 carries ("how a service announces itself and how the roster is queried", docs/contract-ownership.md:10-12). The GET /projects row additionally repairs a pre-image incoherence: api.md's own body has documented the roster (the "## GET /projects" section, docs/api.md:129 area) while the "complete" table omitted it.
  - claim: |
      The five newly tabled routes (docs/api.md:19-23, post-image) receive table rows only — no per-route body sections. Every other route in the document has a full section with JSON shape and status semantics; README.md:110-111 promises api.md holds "every control-port route and JSON shape"; and the "two distinct 404 semantics" passage (docs/api.md:30-36, post-image) classifies none of the new name-taking routes (`/resolve/{name}`, `/services/{name}`).
    necessary: false
    justification: |
      Nothing about this diff required stopping at table rows: the shapes are already pinned by named contracts the rows themselves cite (`registry.v1.RegistrationSet`, `resolve.v1.ResolvedService` — docs/api.md:20-21, post-image), so the sections were writable alongside. The table's completeness claim (docs/api.md:4-5) is restored, but the document's own descriptive bar — a section per route, as /health through /mcp all have — is not met for the new surface, which is the minimum-change smell the whole-document standard warns against. Non-blocking at this scale, consistent with the necessary:false precedent in rulings/2026-07-02T082925Z-delightd-pr65.yaml (second divergence): recorded so a docs follow-up adds the five route sections and their 404/error semantics instead of letting the gap drift silently.
  shape_verdict: on-mesh
  shape_justification: |
    The checker is built the way this fleet builds gates: Go (the control-plane language of record), with the entire decision kept as a pure function precisely so it is unit-testable apart from git and the filesystem ("check is the whole gate, kept pure for the tests", tools/docpairs/main.go:70-71), and the tests cover every matcher shape the map documents — segment-boundary prefix matching included ("pkg/httpapifake/x.go", false — tools/docpairs/main_test.go:69) — plus the doc-never-triggers-its-own-pairing rule (tools/docpairs/main.go:78-79; tools/docpairs/main_test.go:34-40). Failure is loud and typed, never silent: violations name every offending path and exit 1 (tools/docpairs/main.go:62-67), operational errors exit 2 (tools/docpairs/main.go:142-145), and the no-base case passes while saying exactly why — "a gate that guesses is worse than a gate that says so" (tools/docpairs/main.go:11-13, 36-39) — fail-soft with candor rather than a fabricated green. The matcher is deliberately minimal, with its three shapes documented in the map (.docpairs:7-8) and expansion marked as "a deliberate extension, not an accident" (tools/docpairs/main.go:95-98) — no over-built machinery. The CI job is correctly scoped to pull requests with full history for the merge-base diff (.github/workflows/ci.yml:91, 95-96), and the diff is self-consistent under its own gate: it touches no paired glob, and the api.md catch-up alone is legal by the self-pairing rule. The one shape gap is the missing per-route sections recorded in the third divergence — a docs-completeness debt, not a structural fault.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-docpairs/rulings/2026-07-02T091958Z-delightd-pr68.yaml

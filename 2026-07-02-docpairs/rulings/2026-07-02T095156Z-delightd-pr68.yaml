  judge_instance: judge-20260702T093839Z-p8428
  fired_at: 2026-07-02T09:40:30Z
  verdict: ratify
  divergences:
  - claim: |
      The doc-pairing map (.docpairs:1-16) appears in no provided design doc, and this head departs from the gate shape the two prior rulings on this PR ratified: those heads carried a mechanical checker (tools/docpairs/main.go, its tests) and a CI job, none of which exist in the repo tree at this head — no `tools/` path appears in the tree at all, and the diff contains only the map and the api.md catch-up.
    necessary: true
    justification: |
      The gate family remains design-sanctioned even though this gate's own spec is not in the bundle: docs/contract-ownership.md:24-26 records ADR-0001 ("the coding-process gates") as the governing frame, and the map is exactly a coding-process gate artifact. The withdrawal of the mechanical half is not silent drift — the artifact itself records the ratification and its authority: "Nothing mechanical counts touches against this file (ADR-0002: doc pairing binds through the judge)" (.docpairs:9-10), and the map's stated role is coherent without an enforcer because it declares itself "DATA for the judgment gate: when a pull request changes paths matching a glob on the left, the document on the right is IMPLICATED" (.docpairs:3-7) — the consumer of the map is this gate, which exists and is firing. I stay consistent with the prior rulings on this PR (rulings/2026-07-02T091958Z-delightd-pr68.yaml, rulings/2026-07-02T092424Z-delightd-pr68.yaml) by the same rule they applied: the judge rules on the diff at head against the materials provided, and at this head the diff no longer contains the checker while the map's own text names the ADR that withdrew it. Blast radius is purely additive process data: no runtime surface, contract, or daemon behavior described in any provided design doc is altered. Recorded so the ledger ties this head to ADR-0002, which is not among the provided materials.
  - claim: |
      docs/api.md gains six routes this diff does not implement — the `GET /projects` table row (docs/api.md:12, post-image) and `POST /register`, `GET /registrations`, `GET /resolve/{name}`, `GET /services`, `GET /services/{name}` (docs/api.md:19-23, post-image, with full body sections at docs/api.md:294-384, post-image) — under the standing claim that the table is "the complete surface registered in `Mux()`" (docs/api.md:4-5).
    necessary: true
    justification: |
      Carried in substance from rulings/2026-07-02T092424Z-delightd-pr68.yaml (second divergence), which ratified this same docs content at a prior head of this PR. This is the doc tracking reality, and it completes the repair staged across the pr65 rulings: the registration rows close the follow-up first recorded in rulings/2026-07-02T082925Z-delightd-pr65.yaml and re-recorded in rulings/2026-07-02T083348Z-delightd-pr65.yaml (api.md "contains no `/registrations` route and no registration-accept route"), and the per-route body sections plus 404-taxonomy classification (docs/api.md:30-41, post-image) close the necessary:false gap the first pr68 ruling recorded. Evidence the routes exist at head is the strongest this bundle format carries (path-level tree state, per rulings/2026-07-02T074856Z-magpie-pr22.yaml): pkg/httpapi/register.go and pkg/httpapi/register_test.go for /register and /registrations; proto/resolve/v1/resolve.proto, gen/rust/src/resolve.rs, and gen/rust/src/resolve/v1.rs for the resolve surface, which docs/contract-ownership.md:13-14 pins as delightd-owned; pkg/registry/registry.go plus the vocabulary tests (pkg/registry/vocabulary_test.go, pkg/httpapi/vocabulary_test.go) for the composed /services roster ("how a service announces itself and how the roster is queried", docs/contract-ownership.md:10-12); pkg/schemaregistry/client.go for the fail-closed contract-verification gate the /register section describes (docs/api.md:296-301, post-image). The `GET /projects` row additionally repairs a pre-image incoherence internal to the document: the body has carried a full "## GET /projects" section (the roster seam docs/fleet-and-delightd.md sanctions: "delightd exposes the roster as a listing: `GET /projects`") while the "complete" table omitted it.
  - claim: |
      The `POST /register` section asserts "Every decline also emits a never-silent `registry.v1.NotRegistered` event on a detached goroutine" (docs/api.md:318-319, post-image), while docs/events.md — which presents itself as the Kafka event contract ("The implementation is `pkg/events`; this document is the contract", docs/events.md:6-8) — documents only `delight.v1.BackupEvent` (docs/events.md:3-4) and remains untouched by this diff.
    necessary: false
    justification: |
      Carried unchanged from rulings/2026-07-02T092424Z-delightd-pr68.yaml (third divergence), still open at this head. The event's existence is supported by proto/registry/v1/events.proto in the repo tree and its ownership is design-sanctioned (`registry.v1` is delightd-owned, docs/contract-ownership.md:10-12), so the api.md sentence is truthful. But after this diff delightd's docs describe two emitted event families while the events contract doc describes one — the untouched-doc-made-incomplete pattern ratified as necessary:false precedent (rulings/2026-07-02T082925Z-delightd-pr65.yaml, second divergence). Non-blocking; re-recorded so a docs follow-up absorbs the registration-decline event (topic, subject, framing, best-effort semantics) into docs/events.md instead of letting the gap drift for a third head.
  shape_verdict: on-mesh
  shape_justification: |
    This head is the gate reduced to its honest minimum plus the docs debt paid in full. The map is deliberately small and self-describing: three pairings, each obviously true against the component table's own package-to-doc mapping (pkg/httpapi described by api.md, config and the Taskfile by operations.md), with the format pinned in the file (.docpairs:12) and the division of labor stated where it binds — the map implicates, the judge rules (.docpairs:3-7, 9-10) — which is exactly the writer-is-not-judge posture the gate model requires, now without a mechanical layer that could be mistaken for the content check. The docs half meets the document's own bar rather than the minimum: the five new routes get full per-route sections in the established house pattern (JSON example, status table, error bodies — docs/api.md:294-384, post-image), and the deliberate 404 taxonomy is extended to classify every new name-taking route rather than leaving them implicit (/services/{name} and POST /register on the control axis, /resolve/{name} as its own always-404-never-503 commitment — docs/api.md:30-41, post-image). Semantics stay consistent with the governing docs: the /register ladder fails closed on an unreachable schema registry (503, docs/api.md:308, post-image), matching docs/availability.md's fail-closed posture, and the register stays plain and concrete throughout. The diff is self-consistent under its own map: it changes no path matching a paired glob (docs and the map itself only). The one remaining seam is the events.md gap recorded in the third divergence — a docs-completeness debt, not a structural fault.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-docpairs/rulings/2026-07-02T095156Z-delightd-pr68.yaml

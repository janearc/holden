ruling:
  diff_ref: dbb58654e34fc8a476bec11a9a7455fbf9dcfae7
  judge_instance: judge-20260702T083244Z-p72661
  fired_at: 2026-07-02T08:33:40Z
  verdict: ratify
  divergences:
  - claim: |
      The diff proves and asserts a registration surface — magpie's real client driven via register_once (tests/e2e/registration/registration_test.go:146-148) and the result read from `GET /registrations` (tests/e2e/registration/registration_test.go:159) — that appears in no provided design doc: docs/api.md:4-5 declares its route table "the complete surface registered in `Mux()`", and that table (docs/api.md:7-18) contains no `/registrations` route and no registration-accept route.
    necessary: true
    justification: |
      Carried unchanged from the prior ruling on this PR (rulings/2026-07-02T082925Z-delightd-pr65.yaml, first divergence), which ratified the identical test content at the prior head sha. The seam is design-sanctioned — docs/contract-ownership.md:10-11 pins `registry.v1` ("project registration: how a service announces itself and how the roster is queried") as owned by delightd — and the surface exists at head (pkg/httpapi/register.go, pkg/httpapi/register_test.go, proto/registry/v1/register.proto in the repo tree). An end-to-end proof must exercise the real endpoint. The staleness is docs/api.md's, pre-dates this diff, and this head still does not touch api.md: this diff answered the prior ruling's operations.md follow-up but the api.md follow-up remains open. Re-recorded so it does not drift silently; bouncing a diff that does not touch api.md would not fix that document.
  - claim: |
      The test header justifies its schema-registry stub by "the bus layer... which this proof deliberately does not reach" and frames the proof against ADR-0001 pilot scope (tests/e2e/registration/registration_test.go:5-27); neither the T0 text nor ADR-0001's criteria are among the design docs provided.
    necessary: true
    justification: |
      Carried unchanged from the prior ruling on this PR (rulings/2026-07-02T082925Z-delightd-pr65.yaml, third divergence). The stub choice stands on the provided materials without the external citations: the docs make the Kafka/Schema-Registry side optional and never load-bearing ("Kafka and the Schema Registry are optional... the daemon runs exactly as before", docs/availability.md:52-54; "Best-effort, always", docs/events.md:9), and the test drives the verification code path against a live HTTP server rather than mocking it out (tests/e2e/registration/registration_test.go:66-73). The stub is declared plainly in the header (tests/e2e/registration/registration_test.go:13-27), which is the honesty the register requires. No clarification is needed to rule on this diff.
  shape_verdict: on-mesh
  shape_justification: |
    The prior ruling on this PR found the test and Taskfile entry on-mesh at the previous head sha, and this head strengthens that finding rather than disturbing it: the only new hunk is the docs/operations.md Build-section update (docs/operations.md:172-178, post-image), which is exactly the follow-up the prior ruling's second (necessary:false) divergence recorded — the Taskfile enumeration the doc presents as "the entry point" (docs/operations.md:170) is once again the complete task surface, now including `task e2e-registration` with its local-first preconditions stated plainly ("needs ~/work/magpie checked out and uv on PATH", docs/operations.md:176-177, post-image), matching the Taskfile entry's own desc (Taskfile.yml:36-37, post-image). The test itself remains the honest end-to-end shape the design docs make load-bearing: the daemon is compiled from the tree under review (tests/e2e/registration/registration_test.go:85-89), the client is magpie's real registration code, never mocked (tests/e2e/registration/registration_test.go:146-149), the assertion is the registered contracts standing in the live registry (tests/e2e/registration/registration_test.go:159, 192-207), isolation uses only documented delight.yaml keys under a fake HOME and temp roots (tests/e2e/registration/registration_test.go:106-130 against docs/operations.md:12 and the schema at docs/operations.md:20-52), readiness gates on the documented /health probe (tests/e2e/registration/registration_test.go:142; docs/api.md GET /health), and the `e2e` build tag keeps the documented `task test` green without the magpie checkout. Failure modes stay loud, not silent (waitHealthy's t.Fatalf, tests/e2e/registration/registration_test.go:236-249). The one candor gap — "Not wired into CI (recorded follow-up)" (tests/e2e/registration/registration_test.go:24) — is stated in the artifact itself, and no provided design doc requires this test in CI.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-e2e/rulings/2026-07-02T083348Z-delightd-pr65.yaml

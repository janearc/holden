ruling:
  diff_ref: 8e698a9451c899b18f8324077b2df6907e18dd7d
  judge_instance: judge-20260702T082442Z-p67987
  fired_at: 2026-07-02T08:26:10Z
  verdict: ratify
  divergences:
  - claim: |
      The diff proves and asserts a registration surface — magpie's real client accepted by handleRegister and the result read from `GET /registrations` (tests/e2e/registration/registration_test.go:146-148, tests/e2e/registration/registration_test.go:159) — that appears in no provided design doc: docs/api.md:4-5 declares its route table "the complete surface registered in `Mux()`", and that table (docs/api.md:7-18) contains no `/registrations` route and no registration-accept route.
    necessary: true
    justification: |
      The seam itself is design-sanctioned: docs/contract-ownership.md:10-11 pins `registry.v1` — "project registration: how a service announces itself and how the roster is queried" — as owned by delightd and recorded as the ADR-0001 pilot prerequisite, and the surface exists at head (pkg/httpapi/register.go, pkg/httpapi/register_test.go, proto/registry/v1/register.proto in the repo tree — path-level tree evidence, the strongest this bundle format carries per rulings/2026-07-02T074856Z-magpie-pr22.yaml). An end-to-end proof must exercise the real endpoint, so targeting it is necessary. The departure is that docs/api.md has not absorbed the registration routes — a staleness that pre-dates this docs-untouched diff (register.go is at head and not in this diff). Recorded so a docs follow-up adds the registration surface to api.md and restores its completeness claim; bouncing this test-only diff would not fix that document.
  - claim: |
      Taskfile.yml gains the `e2e-registration` entry point (Taskfile.yml:35-38, post-image) while docs/operations.md's Build section (docs/operations.md:170-177) still lists only `task generate`, `task build`, `task test`, and `task sync-proto` as the Taskfile surface — this diff makes an untouched design doc incomplete.
    necessary: false
    justification: |
      docs/operations.md:170 presents the Taskfile as "the entry point" and enumerates its tasks (docs/operations.md:172-177); after this diff that enumeration is no longer the whole build surface. A one-line addition alongside this diff would have kept the doc the truthful description of the system at head, and nothing about the test required omitting it. Non-blocking at this scale — precedent ratified with a recorded necessary:false divergence (rulings/2026-07-02T074856Z-magpie-pr22.yaml, second divergence) — but recorded here so the omission lands in a docs follow-up instead of drifting silently.
  - claim: |
      The test header justifies its schema-registry stub by "the bus is out of pilot scope by the ratified sprint T0" (tests/e2e/registration/registration_test.go:16-17) and frames the proof as "ADR-0001 pilot criterion 4" (tests/e2e/registration/registration_test.go:7); neither the T0 text nor ADR-0001's criteria are among the design docs provided.
    necessary: true
    justification: |
      The stub choice stands on the provided materials without the external citations: the docs make the Kafka/Schema-Registry side optional and never load-bearing ("Kafka and the Schema Registry are optional... the daemon runs exactly as before", docs/availability.md:52-54; "Best-effort, always", docs/events.md:9), and the test still drives the verification code path against a live HTTP server rather than mocking it out (tests/e2e/registration/registration_test.go:14-16, tests/e2e/registration/registration_test.go:66-73). The stub is declared plainly in the header rather than hidden (tests/e2e/registration/registration_test.go:13-21), which is the honesty the register requires. Recorded so the sprint ledger can confirm T0 says what the header claims; no clarification is needed to rule on this diff.
  shape_verdict: on-mesh
  shape_justification: |
    This is the kind of test the design docs make load-bearing — service A talks to service B and the product is observed on the delightd side, across the exact seam the availability contract stakes everything on — and it is built the honest way: the daemon is compiled from the tree under review, "not whatever binary happens to be installed" (tests/e2e/registration/registration_test.go:85-89); the client is magpie's real registration code, never mocked (tests/e2e/registration/registration_test.go:21, tests/e2e/registration/registration_test.go:146-149); and the assertion is the registered contracts standing in the live registry (tests/e2e/registration/registration_test.go:159, tests/e2e/registration/registration_test.go:192-207). Isolation is thorough and matches the documented operational contract: config is written only through documented delight.yaml keys (tests/e2e/registration/registration_test.go:106-119 against the schema in docs/operations.md:20-52), resolved via the documented cwd path with a fake HOME so the operator's real ~/etc/delightd is unreachable (tests/e2e/registration/registration_test.go:128-130; docs/operations.md:12), every root under a temp dir so no real state — including the read-only work tree — is touched, and readiness gates on the documented /health probe (tests/e2e/registration/registration_test.go:142; docs/api.md GET /health). The `e2e` build tag plus a separate Taskfile entry keeps the documented `task test` (`go test ./...`, Taskfile.yml:31-33 context) green without the magpie checkout, so the blast radius is purely additive. Failure modes are loud, not silent: a daemon that never comes up fails as itself, not as a seam failure (tests/e2e/registration/registration_test.go:221-223 comment and waitHealthy's t.Fatalf). The one candor gap — "Not wired into CI (recorded follow-up)" (tests/e2e/registration/registration_test.go:24) — is stated in the artifact itself, and no provided design doc requires this test in CI.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-e2e/rulings/2026-07-02T082925Z-delightd-pr65.yaml

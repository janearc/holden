ruling:
  diff_ref: af5aa63af33380454827df06c92534701ef2dcaf
  judge_instance: judge-20260702T074750Z-p44966
  fired_at: 2026-07-02T07:48:36Z
  verdict: ratify
  divergences:
  - claim: |
      The Status section reclassifies delightd registration, the agent skill + wrapper, and the kube manifests from "still to wire" (README.md:39-41, pre-image) to "working today" (README.md:39-41, post-image).
    necessary: true
    justification: |
      The prior ruling on this exact head sha (rulings/2026-07-02T074505Z-magpie-pr22.yaml) returned needs-clarification solely because the bundle lacked the head tree; it stated the doc update is "necessary and correct — docs must track reality" if the code exists, and asked for the head-sha tree state to re-fire. That tree is now provided and evidences every reclassified item: delightd registration (magpie/register.py, tests/test_register.py), the agent skill + wrapper (skill/SKILL.md, skill/magpie, tests/test_wrapper_prompt_guard.py), and the kube manifests (kube/kustomization.yaml, kube/service.yaml). The design doc's own pre-image framed these as pending, so moving them to "working today" once they exist at head is the doc tracking reality, which the governing register requires. The parenthetical behavioral detail (register-on-start, health-gated, retry while unreachable; README.md:40-41, post-image) cannot be read off paths alone, but the presence of dedicated test files (tests/test_register.py, tests/test_wrapper_prompt_guard.py) is the strongest evidence the bundle format can carry for it, and the prior ruling committed this instance to deciding on tree state.
  - claim: |
      The post-image asserts "magpie declares its emit contracts but does not yet put events on the bus" (README.md:42-43, post-image), but no dedicated contract artifact (proto or similar) appears in the head tree, and CONTRACTS TOUCHED is none.
    necessary: false
    justification: |
      The head tree contains no path that is unambiguously a contract declaration; the declaration could plausibly live inside magpie/daemon.py or magpie/register.py, which paths alone cannot confirm. The clause is hedged, sits inside the honest "still to wire" remainder (README.md:42-43, post-image), and the absence of a Go sidecar in the tree is consistent with the claim that events are not yet on the bus. Non-blocking, but recorded so a future ruling on the frood sidecar PR checks that the emit contracts actually exist where this sentence says they do.
  shape_verdict: on-mesh
  shape_justification: |
    Unchanged from the prior ruling on this sha, which found shape on-mesh: the edit keeps the plain stoic register and canonical vocabulary (frood, bus — README.md:42-43, post-image), replaces status vagueness with concrete behavioral statements ("register-on-start, health-gated, with retry while delightd is unreachable", README.md:40-41, post-image), stays honest about the remaining gap rather than overclaiming (README.md:42-43, post-image), and confines the blast radius to a single docs hunk. The prior ruling's only reservation was verifiability of content, not shape, and the now-provided head tree resolves that reservation.
  consumer_impact: []
  doc_content_agreement: agree
  ledger_entry_id: 2026-07-02-judge/rulings/2026-07-02T074856Z-magpie-pr22.yaml
